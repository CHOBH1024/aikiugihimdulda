<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진단 결과 | Mirror Inside Parenting</title>
    <meta name="description" content="당신만의 육아 페르소나 분석 결과를 확인하세요.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* === Result Page Specific Styles === */
        .result-wrapper {
            padding-top: 80px;
        }

        /* Hero Section */
        .result-hero {
            text-align: center;
            padding: 80px 24px 60px;
            position: relative;
        }

        .result-hero__overline {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease both;
        }

        .result-hero__title {
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 950;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.15s;
        }

        .result-hero__desc {
            font-size: 1.2rem;
            color: var(--text-body);
            max-width: 600px;
            margin: 0 auto;
            word-break: keep-all;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.3s;
        }

        /* Glowing background orb */
        .result-hero__glow {
            position: absolute;
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }

        /* Radar Section */
        .radar-section {
            padding: 40px 0 80px;
        }

        .radar-wrapper {
            display: flex;
            justify-content: center;
            animation: scaleIn 1s ease both;
            animation-delay: 0.5s;
        }

        .radar-chart-container {
            position: relative;
            width: 380px;
            height: 380px;
        }

        @media (max-width: 480px) {
            .radar-chart-container {
                width: 300px;
                height: 300px;
            }
        }

        /* Summary Stats */
        .summary-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 48px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.7s;
        }

        .summary-stat {
            text-align: center;
        }

        .summary-stat__value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
        }

        .summary-stat__label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Dimension Results */
        .dimensions-results {
            padding: 60px 0;
        }

        .dim-result-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-bottom: 24px;
            transition: var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .dim-result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--dim-color, var(--primary));
            border-radius: 4px 0 0 4px;
        }

        .dim-result-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .dim-result-card__header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
        }

        .dim-result-card__icon-box {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            font-size: 2rem;
            flex-shrink: 0;
        }

        .dim-result-card__meta {
            flex: 1;
        }

        .dim-result-card__dim-name {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .dim-result-card__type-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .dim-result-card__score-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: right;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .dim-result-card__bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .dim-result-card__bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0;
        }

        .dim-result-card__desc {
            color: var(--text-body);
            font-size: 1rem;
            line-height: 1.8;
            word-break: keep-all;
            margin-bottom: 20px;
        }

        .dim-result-card__strengths {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .strength-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .dim-result-card__tip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            font-size: 0.95rem;
            color: var(--text-body);
            word-break: keep-all;
            line-height: 1.7;
        }

        .dim-result-card__tip::before {
            content: '💡 성장 팁: ';
            color: var(--secondary);
            font-weight: 700;
        }

        /* All Types Grid (within dimension) */
        .all-types-toggle {
            margin-top: 16px;
            font-size: 0.9rem;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-fast);
        }

        .all-types-toggle:hover { color: var(--primary); }

        .all-types-grid {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .all-types-grid.open { display: grid; }

        .all-type-chip {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: var(--transition-fast);
        }

        .all-type-chip.active {
            background: var(--primary-dim);
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--primary);
            font-weight: 700;
        }

        /* Share Section */
        .share-section {
            text-align: center;
            margin: 80px 0;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
        }

        .share-section h3 {
            margin-bottom: 12px;
        }

        .share-section p {
            color: var(--text-body);
            margin-bottom: 32px;
            word-break: keep-all;
        }

        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition-base);
        }

        .share-btn--copy {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .share-btn--copy:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .share-btn--retry {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-body);
        }

        .share-btn--retry:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .share-btn--home {
            background: var(--primary);
            color: var(--bg-main);
        }

        .share-btn--home:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--primary-glow);
        }

        /* No result fallback */
        .no-result {
            text-align: center;
            padding: 200px 24px;
        }

        .no-result h2 { margin-bottom: 20px; }
        .no-result p { color: var(--text-body); margin-bottom: 32px; }

        @media (max-width: 768px) {
            .dim-result-card { padding: 28px; }
            .dim-result-card__header { flex-direction: column; gap: 12px; }
            .share-section { padding: 40px 24px; }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="nav scrolled">
        <div class="nav__inner">
            <a href="index.html" class="nav__logo">
                Mirror Inside <span class="nav__logo-sub">Parenting</span>
            </a>
            <ul class="nav__links">
                <li><a href="index.html" class="nav__link">홈</a></li>
                <li><a href="test.html" class="nav__cta"><i class="fas fa-redo"></i> 다시 진단</a></li>
            </ul>
        </div>
    </nav>

    <div class="result-wrapper container" id="resultWrapper">
        <!-- Will be populated by JS -->
    </div>

    <script src="data.js"></script>
    <script>
        // === Load Results ===
        const results = loadResults();

        if (!results) {
            document.getElementById('resultWrapper').innerHTML = `
                <div class="no-result">
                    <h2>아직 진단 결과가 없습니다</h2>
                    <p>먼저 육아 DNA 진단을 완료해주세요.</p>
                    <a href="test.html" class="btn btn--primary btn--large">
                        <i class="fas fa-play"></i> 진단 시작하기
                    </a>
                </div>
            `;
        } else {
            renderResults(results);
        }

        function renderResults(results) {
            const { overallPersona, dimensionTypes } = results;
            const wrapper = document.getElementById('resultWrapper');

            // Calculate overall score average
            const dimIds = Object.keys(dimensionTypes);
            const avgScore = Math.round(dimIds.reduce((sum, id) => sum + dimensionTypes[id].normalizedScore, 0) / dimIds.length);
            const topDim = dimIds.reduce((a, b) => dimensionTypes[a].normalizedScore > dimensionTypes[b].normalizedScore ? a : b);
            const topDimData = DIMENSIONS.find(d => d.id === topDim);

            wrapper.innerHTML = `
                <!-- Hero -->
                <section class="result-hero">
                    <div class="result-hero__glow"></div>
                    <div class="result-hero__overline">Your Parenting Archetype</div>
                    <h1 class="result-hero__title">
                        <span class="text-gradient">${overallPersona.name}</span>
                    </h1>
                    <p class="result-hero__desc">${overallPersona.desc}</p>
                </section>

                <!-- Radar Chart -->
                <section class="radar-section">
                    <div class="radar-wrapper">
                        <div class="radar-chart-container">
                            <canvas id="radarCanvas"></canvas>
                        </div>
                    </div>
                    <div class="summary-stats">
                        <div class="summary-stat">
                            <div class="summary-stat__value">${avgScore}%</div>
                            <div class="summary-stat__label">종합 역량 지수</div>
                        </div>
                        <div class="summary-stat">
                            <div class="summary-stat__value">${topDimData.icon} ${topDimData.name}</div>
                            <div class="summary-stat__label">최강 차원</div>
                        </div>
                        <div class="summary-stat">
                            <div class="summary-stat__value">35</div>
                            <div class="summary-stat__label">분석 유형 중</div>
                        </div>
                    </div>
                </section>

                <!-- Dimension Results -->
                <section class="dimensions-results">
                    <div class="text-center mb-5">
                        <span class="section-tag">Dimension Analysis</span>
                        <h2>5대 차원 상세 분석</h2>
                    </div>
                    <div id="dimResultsContainer"></div>
                </section>

                <!-- Share -->
                <section class="share-section">
                    <h3>결과를 공유하세요</h3>
                    <p>나의 육아 페르소나를 가족, 친구에게 알려보세요!</p>
                    <div class="share-buttons">
                        <button class="share-btn share-btn--copy" onclick="copyResult()">
                            <i class="fas fa-copy"></i> 결과 복사
                        </button>
                        <a href="test.html" class="share-btn share-btn--retry">
                            <i class="fas fa-redo"></i> 다시 진단
                        </a>
                        <a href="index.html" class="share-btn share-btn--home">
                            <i class="fas fa-home"></i> 홈으로
                        </a>
                    </div>
                </section>

                <!-- Footer -->
                <footer class="footer" style="margin-top: 40px;">
                    <p>&copy; 2026 Mirror Inside Parenting. All rights reserved.</p>
                </footer>
            `;

            // Render dimension result cards
            renderDimensionCards(dimensionTypes);

            // Draw radar chart
            setTimeout(() => drawRadarChart(dimensionTypes), 100);
        }

        function renderDimensionCards(dimensionTypes) {
            const container = document.getElementById('dimResultsContainer');
            const dimColors = {
                emotional: { bg: 'rgba(251, 191, 36, 0.12)', color: '#fbbf24', barGrad: 'linear-gradient(90deg, #fbbf24, #f59e0b)' },
                discipline: { bg: 'rgba(96, 165, 250, 0.12)', color: '#60a5fa', barGrad: 'linear-gradient(90deg, #60a5fa, #3b82f6)' },
                autonomy: { bg: 'rgba(52, 211, 153, 0.12)', color: '#34d399', barGrad: 'linear-gradient(90deg, #34d399, #10b981)' },
                growth: { bg: 'rgba(192, 132, 252, 0.12)', color: '#c084fc', barGrad: 'linear-gradient(90deg, #c084fc, #a855f7)' },
                resilience: { bg: 'rgba(251, 113, 133, 0.12)', color: '#fb7185', barGrad: 'linear-gradient(90deg, #fb7185, #f43f5e)' }
            };

            DIMENSIONS.forEach((dim, idx) => {
                const result = dimensionTypes[dim.id];
                const persona = result.type;
                const colors = dimColors[dim.id];
                const score = Math.min(result.normalizedScore, 100);

                const card = document.createElement('div');
                card.className = 'dim-result-card';
                card.style.setProperty('--dim-color', colors.color);
                card.style.opacity = '0';
                card.style.animation = `fadeInUp 0.6s ease ${idx * 0.15}s both`;

                const allTypes = PERSONA_TYPES[dim.id];

                card.innerHTML = `
                    <div class="dim-result-card__header">
                        <div class="dim-result-card__icon-box" style="background:${colors.bg}">
                            ${dim.icon}
                        </div>
                        <div class="dim-result-card__meta">
                            <div class="dim-result-card__dim-name">${dim.nameEn}</div>
                            <div class="dim-result-card__type-name">${persona.name}</div>
                        </div>
                        <div class="dim-result-card__score-label">${score}%</div>
                    </div>

                    <div class="dim-result-card__bar">
                        <div class="dim-result-card__bar-fill" id="bar-${dim.id}" 
                             style="background:${colors.barGrad}"></div>
                    </div>

                    <div class="dim-result-card__desc">${persona.desc}</div>

                    <div class="dim-result-card__strengths">
                        ${persona.strengths.map(s => `
                            <span class="strength-tag" style="background:${colors.bg}; color:${colors.color}">
                                ✦ ${s}
                            </span>
                        `).join('')}
                    </div>

                    <div class="dim-result-card__tip">${persona.tip}</div>

                    <div class="all-types-toggle" onclick="toggleTypes('${dim.id}')">
                        <i class="fas fa-chevron-down"></i>
                        이 차원의 7가지 유형 모두 보기
                    </div>
                    <div class="all-types-grid" id="types-${dim.id}">
                        ${allTypes.map((t, i) => `
                            <div class="all-type-chip ${i === result.typeIndex ? 'active' : ''}">
                                ${i === result.typeIndex ? '★ ' : ''}${t.name}
                            </div>
                        `).join('')}
                    </div>
                `;

                container.appendChild(card);

                // Animate score bar
                setTimeout(() => {
                    const bar = document.getElementById(`bar-${dim.id}`);
                    if (bar) bar.style.width = `${score}%`;
                }, 300 + idx * 200);
            });
        }

        function toggleTypes(dimId) {
            const grid = document.getElementById(`types-${dimId}`);
            grid.classList.toggle('open');
        }

        // === Radar Chart Drawing ===
        function drawRadarChart(dimensionTypes) {
            const canvas = document.getElementById('radarCanvas');
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const container = canvas.parentElement;
            const size = container.offsetWidth;
            canvas.width = size * dpr;
            canvas.height = size * dpr;
            canvas.style.width = size + 'px';
            canvas.style.height = size + 'px';
            ctx.scale(dpr, dpr);

            const cx = size / 2;
            const cy = size / 2;
            const maxR = size / 2 - 50;
            const n = 5;
            const angles = [];
            for (let i = 0; i < n; i++) {
                angles.push((Math.PI * 2 * i / n) - Math.PI / 2);
            }

            const dimColors = ['#fbbf24', '#60a5fa', '#34d399', '#c084fc', '#fb7185'];

            // Grid rings
            for (let ring = 1; ring <= 5; ring++) {
                const r = (maxR / 5) * ring;
                ctx.beginPath();
                for (let i = 0; i < n; i++) {
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `rgba(255,255,255,${ring === 5 ? 0.08 : 0.04})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Axes
            for (let i = 0; i < n; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + maxR * Math.cos(angles[i]), cy + maxR * Math.sin(angles[i]));
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Labels
            const dimIds = DIMENSIONS.map(d => d.id);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            DIMENSIONS.forEach((dim, i) => {
                const lr = maxR + 35;
                const x = cx + lr * Math.cos(angles[i]);
                const y = cy + lr * Math.sin(angles[i]);

                // Icon
                ctx.font = '18px sans-serif';
                ctx.fillText(dim.icon, x, y - 10);

                // Name
                ctx.font = '600 12px Pretendard';
                ctx.fillStyle = dimColors[i];
                ctx.fillText(dim.name, x, y + 8);
            });

            // Data values
            const values = DIMENSIONS.map(d => {
                const score = dimensionTypes[d.id].normalizedScore;
                return Math.max(0.1, score / 100);
            });

            // Animate the radar
            let progress = 0;
            const animDuration = 60; // frames
            
            function animate() {
                progress++;
                const t = Math.min(progress / animDuration, 1);
                const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic

                // Clear data area only
                ctx.save();

                // Data fill
                ctx.beginPath();
                values.forEach((v, i) => {
                    const r = maxR * v * ease;
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();

                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
                grad.addColorStop(0, 'rgba(52, 211, 153, 0.3)');
                grad.addColorStop(0.5, 'rgba(129, 140, 248, 0.15)');
                grad.addColorStop(1, 'rgba(251, 113, 133, 0.1)');
                ctx.fillStyle = grad;
                ctx.fill();

                // Data stroke
                ctx.beginPath();
                values.forEach((v, i) => {
                    const r = maxR * v * ease;
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.strokeStyle = 'rgba(52, 211, 153, 0.7)';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Data points
                values.forEach((v, i) => {
                    const r = maxR * v * ease;
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);

                    // Glow
                    ctx.beginPath();
                    ctx.arc(x, y, 10, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${hexToRgb(dimColors[i])}, 0.2)`;
                    ctx.fill();

                    // Point
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = dimColors[i];
                    ctx.fill();

                    // Score label
                    if (t > 0.8) {
                        const labelR = maxR * v * ease + 18;
                        const lx = cx + labelR * Math.cos(angles[i]);
                        const ly = cy + labelR * Math.sin(angles[i]);
                        ctx.font = '700 11px Outfit';
                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                        ctx.textAlign = 'center';
                        ctx.fillText(Math.round(v * 100) + '%', lx, ly);
                    }
                });

                ctx.restore();

                if (progress < animDuration) {
                    requestAnimationFrame(animate);
                }
            }

            // Start animation after a brief delay
            setTimeout(animate, 500);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }

        // === Copy Result ===
        function copyResult() {
            if (!results) return;
            const { overallPersona, dimensionTypes } = results;
            let text = `🧬 Mirror Inside Parenting 진단 결과\n\n`;
            text += `📋 종합 유형: ${overallPersona.name}\n`;
            text += `${overallPersona.desc}\n\n`;

            DIMENSIONS.forEach(dim => {
                const r = dimensionTypes[dim.id];
                text += `${dim.icon} ${dim.name}: ${r.type.name} (${r.normalizedScore}%)\n`;
            });

            text += `\n🔗 나도 진단받기: ${window.location.origin}/test.html`;

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.share-btn--copy');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> 복사됨!';
                btn.style.borderColor = 'var(--primary)';
                btn.style.color = 'var(--primary)';
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        // Handle resize
        window.addEventListener('resize', () => {
            if (results) {
                drawRadarChart(results.dimensionTypes);
            }
        });
    </script>
</body>
</html>
