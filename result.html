    <style>
        /* === Result Page Specific Styles === */
        .result-wrapper {
            padding-top: 80px;
        }

        /* Hero Section */
        .result-hero {
            text-align: center;
            padding: 80px 24px 60px;
            position: relative;
        }

        .result-hero__overline {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            animation: fadeInUp 0.6s ease both;
        }

        .result-hero__title {
            font-size: clamp(2.5rem, 7vw, 4rem);
            font-weight: 950;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.15s;
        }

        .result-hero__desc {
            font-size: 1.2rem;
            color: var(--text-body);
            max-width: 600px;
            margin: 0 auto;
            word-break: keep-all;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.3s;
        }

        /* Glowing background orb */
        .result-hero__glow {
            position: absolute;
            width: 400px;
            height: 400px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(52, 211, 153, 0.08) 0%, transparent 70%);
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }

        /* Radar Section */
        .radar-section {
            padding: 40px 0 80px;
        }

        .radar-wrapper {
            display: flex;
            justify-content: center;
            animation: scaleIn 1s ease both;
            animation-delay: 0.5s;
        }

        .radar-chart-container {
            position: relative;
            width: 380px;
            height: 380px;
        }

        @media (max-width: 480px) {
            .radar-chart-container {
                width: 300px;
                height: 300px;
            }
        }

        /* Summary Stats */
        .summary-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 48px;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.7s;
        }

        .summary-stat {
            text-align: center;
        }

        .summary-stat__value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--primary);
        }

        .summary-stat__label {
            font-size: 0.8rem;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Dimension Results */
        .dimensions-results {
            padding: 60px 0;
        }

        .dim-result-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin-bottom: 24px;
            transition: var(--transition-base);
            position: relative;
            overflow: hidden;
        }

        .dim-result-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--dim-color, var(--primary));
            border-radius: 4px 0 0 4px;
        }

        .dim-result-card:hover {
            border-color: var(--glass-border-hover);
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
        }

        .dim-result-card__header {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            margin-bottom: 24px;
        }

        .dim-result-card__icon-box {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            font-size: 2rem;
            flex-shrink: 0;
        }

        .dim-result-card__meta {
            flex: 1;
        }

        .dim-result-card__dim-name {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .dim-result-card__type-name {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
        }

        .dim-result-card__score-label {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: right;
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        .dim-result-card__bar {
            height: 8px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .dim-result-card__bar-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 1.5s cubic-bezier(0.22, 1, 0.36, 1);
            width: 0;
        }

        .dim-result-card__desc {
            color: var(--text-body);
            font-size: 1rem;
            line-height: 1.8;
            word-break: keep-all;
            margin-bottom: 20px;
        }

        .dim-result-card__strengths {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }

        .strength-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .dim-result-card__tip {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            font-size: 0.95rem;
            color: var(--text-body);
            word-break: keep-all;
            line-height: 1.7;
        }

        .dim-result-card__tip::before {
            content: '💡 성장 팁: ';
            color: var(--secondary);
            font-weight: 700;
        }

        /* All Types Grid (within dimension) */
        .all-types-toggle {
            margin-top: 16px;
            font-size: 0.9rem;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition-fast);
        }

        .all-types-toggle:hover { color: var(--primary); }

        .all-types-grid {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }

        .all-types-grid.open { display: grid; }

        .all-type-chip {
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-sm);
            font-size: 0.85rem;
            color: var(--text-dim);
            transition: var(--transition-fast);
        }

        .all-type-chip.active {
            background: var(--primary-dim);
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--primary);
            font-weight: 700;
        }

        /* Share Section */
        .share-section {
            text-align: center;
            margin: 80px 0;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-xl);
        }

        .share-section h3 {
            margin-bottom: 12px;
        }

        .share-section p {
            color: var(--text-body);
            margin-bottom: 32px;
            word-break: keep-all;
        }

        .share-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .share-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: var(--transition-base);
        }

        .share-btn--copy {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
        }

        .share-btn--copy:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .share-btn--retry {
            background: transparent;
            border: 1px solid var(--glass-border);
            color: var(--text-body);
        }

        .share-btn--retry:hover {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        .share-btn--home {
            background: var(--primary);
            color: var(--bg-main);
        }

        .share-btn--home:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--primary-glow);
        }
        
        .share-btn--img {
            background: linear-gradient(135deg, #a855f7, #ec4899);
            color: #fff;
            border: none;
        }
        
        .share-btn--img:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(236, 72, 153, 0.4);
        }

        /* Simulation Section */
        .simulation-section {
            background: rgba(251, 113, 133, 0.05);
            border: 1px solid rgba(251, 113, 133, 0.2);
            border-radius: var(--radius-lg);
            padding: 40px;
            margin: 60px 0;
            position: relative;
        }
        
        .simulation-section::before {
            content: '🚨 위기 상황 시뮬레이션';
            position: absolute;
            top: -14px;
            left: 30px;
            background: var(--bg-main);
            padding: 0 12px;
            color: var(--secondary);
            font-weight: 800;
            font-size: 0.9rem;
        }

        .simulation-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
        }

        .simulation-card {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }

        @media (max-width: 600px) {
            .simulation-card { flex-direction: column; gap: 12px; }
        }

        .simulation-wrong, .simulation-correct {
            flex: 1;
            padding: 24px;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .simulation-wrong {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            color: var(--text-dim);
        }
        .simulation-wrong::before { content: '❌ 주의할 행동: '; font-weight: 700; color: #f87171; display: block; margin-bottom: 8px;}

        .simulation-correct {
            background: rgba(52, 211, 153, 0.1);
            border: 1px solid rgba(52, 211, 153, 0.3);
            color: var(--text-body);
        }
        .simulation-correct::before { content: '✅ 추천하는 행동: '; font-weight: 700; color: var(--primary); display: block; margin-bottom: 8px;}

        /* Prescription Section (Do's and Don'ts) */
        .prescription-section {
            margin: 60px 0;
        }

        .prescription-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-top: 24px;
        }

        @media (max-width: 768px) {
            .prescription-grid { grid-template-columns: 1fr; }
        }

        .prescription-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 32px;
            height: 100%;
        }

        .prescription-card--dos {
            border-top: 4px solid var(--primary);
            background: linear-gradient(to bottom, rgba(52, 211, 153, 0.05), transparent);
        }

        .prescription-card--donts {
            border-top: 4px solid #f87171;
            background: linear-gradient(to bottom, rgba(248, 113, 113, 0.05), transparent);
        }

        .prescription-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .prescription-card--dos .prescription-title { color: var(--primary); }
        .prescription-card--donts .prescription-title { color: #f87171; }

        .prescription-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .prescription-list li {
            position: relative;
            padding: 16px 20px;
            margin-bottom: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
            color: var(--text-body);
            font-size: 1rem;
            line-height: 1.5;
            word-break: keep-all;
        }

        /* Affiliate Section */
        .affiliate-section {
            display: flex;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            gap: 30px;
            margin: 60px 0;
            align-items: center;
        }

        @media (max-width: 600px) {
            .affiliate-section { flex-direction: column; text-align: center; }
        }

        .affiliate-img {
            width: 120px;
            height: 160px;
            background: #fff;
            border-radius: var(--radius-sm);
            object-fit: cover;
            flex-shrink: 0;
        }

        .affiliate-info h4 { margin-bottom: 8px; color: var(--text-main); }
        .affiliate-info p { color: var(--text-body); font-size: 0.95rem; margin-bottom: 16px; }

        /* Newsletter Section */
        .newsletter-section {
            background: linear-gradient(135deg, rgba(52, 211, 153, 0.1), rgba(129, 140, 248, 0.1));
            border-radius: var(--radius-lg);
            padding: 50px 40px;
            text-align: center;
            margin: 60px 0;
        }

        .newsletter-section h3 { margin-bottom: 12px; }
        .newsletter-section p { color: var(--text-body); margin-bottom: 24px; }
        
        .newsletter-form {
            display: flex;
            max-width: 400px;
            margin: 0 auto;
            gap: 8px;
        }

        .newsletter-form input {
            flex: 1;
            padding: 14px 20px;
            border-radius: 100px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            outline: none;
            transition: var(--transition-fast);
        }
        .newsletter-form input:focus { border-color: var(--primary); }
        
        .newsletter-form button {
            padding: 0 24px;
            border-radius: 100px;
            background: var(--text-main);
            color: var(--bg-main);
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: var(--transition-fast);
        }
        .newsletter-form button:hover { background: var(--primary); color: #fff; }

        /* Photocard Capture Area */
        #photocardArea {
            position: absolute;
            left: -9999px;
            top: 0;
            width: 1080px;
            height: 1080px;
            background: var(--bg-main);
            background-image: radial-gradient(ellipse at 50% 50%, rgba(30, 41, 59, 1) 0%, rgba(6, 11, 38, 1) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px;
            color: #fff;
            box-sizing: border-box;
            z-index: -100;
        }
        .pc-logo { font-family: 'Outfit', sans-serif; font-size: 32px; font-weight: 900; color: var(--primary); margin-bottom: 40px; }
        .pc-rarity { font-size: 28px; color: var(--secondary); font-weight: 700; margin-bottom: 20px; }
        .pc-title { font-size: 80px; font-weight: 950; margin-bottom: 40px; text-align: center; background: linear-gradient(135deg, var(--primary) 0%, #6ee7b7 50%, var(--secondary) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .pc-desc { font-size: 32px; color: #cbd5e1; text-align: center; word-break: keep-all; line-height: 1.6; max-width: 800px; margin-bottom: 60px; }
        .pc-radar { width: 500px; height: 500px; }

        /* No result fallback */
        .no-result {
            text-align: center;
            padding: 200px 24px;
        }

        .no-result h2 { margin-bottom: 20px; }
        .no-result p { color: var(--text-body); margin-bottom: 32px; }

        .notice-banner {
            text-align: center;
            padding: 12px 24px;
            font-size: 0.95rem;
            color: #fff;
            position: relative;
            z-index: 10;
        }
        .notice-banner--mbti { background: linear-gradient(135deg, var(--secondary), #f43f5e); }
        .notice-banner--preview { background: linear-gradient(135deg, #8b5cf6, #c084fc); }

        @media (max-width: 768px) {
            .dim-result-card { padding: 28px; }
            .dim-result-card__header { flex-direction: column; gap: 12px; }
            .share-section { padding: 40px 24px; }
        }

        /* --- New UI Elements (Images & Insights) --- */
        .result-hero__image-wrapper {
            width: 280px;
            height: 280px;
            margin: 0 auto 32px;
            animation: float 6s ease-in-out infinite;
        }
        .result-hero__image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            box-shadow: 0 16px 40px rgba(0,0,0,0.4);
            border: 4px solid var(--glass-border);
        }
        
        .insights-section {
            padding: 20px 0 60px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeInUp 0.8s ease both;
            animation-delay: 0.4s;
        }
        .insight-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 36px;
            transition: var(--transition-base);
        }
        .insight-card:hover {
            transform: translateY(-4px);
            border-color: var(--glass-border-hover);
            box-shadow: var(--shadow-glow);
        }
        .insight-card--strength { border-top: 4px solid var(--primary); }
        .insight-card--weakness { border-top: 4px solid #ef4444; }
        .insight-card--anxiety { border-top: 4px solid #a855f7; }
        
        .insight-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .insight-icon {
            font-size: 1.8rem;
        }
        .insight-header h3 {
            font-size: 1.3rem;
            margin: 0;
            color: var(--text-main);
            font-weight: 800;
        }
        .insight-card ul {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        .insight-card li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 16px;
            color: var(--text-body);
            line-height: 1.7;
            font-size: 1.05rem;
        }
        .insight-card li:last-child { margin-bottom: 0; }
        .insight-card li::before {
            content: '•';
            position: absolute;
            left: 8px;
            top: -2px;
            color: var(--primary);
            font-size: 1.4rem;
        }
        
        /* New Simulation Refinements */
        .sim-content-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .sim-icon {
            font-size: 1.4rem;
        }
    </style>

    <script>
        // === Load Results ===
        let results = null;
        let noticeBanner = '';
        const params = new URLSearchParams(window.location.search);

        if (params.has('mbti')) {
            const mbti = params.get('mbti').toUpperCase();
            const combo = MBTI_MAPPING[mbti] || 'balanced';
            results = generateMockResult(combo);
            noticeBanner = `<div class="notice-banner notice-banner--mbti">본 결과는 <strong>${mbti}</strong> 성향을 바탕으로 예측한 가상의 육아 페르소나입니다. 정확한 결과는 <a href="test.html" style="text-decoration:underline; color:#fff;">정식 테스트</a>로 확인하세요.</div>`;
        } else if (params.has('preview')) {
            const combo = params.get('preview');
            results = generateMockResult(combo);
            noticeBanner = `<div class="notice-banner notice-banner--preview">현재 <strong>미리보기 모드</strong>입니다. 나의 진짜 육아 페르소나를 찾고 싶다면 <a href="test.html" style="text-decoration:underline; color:#fff;">진단하기</a>를 눌러주세요.</div>`;
        } else if (params.has('id')) {
            const history = loadHistory();
            results = history.find(item => item.id === params.get('id'));
        } else {
            results = loadResults();
        }

        if (!results) {
            document.getElementById('resultWrapper').innerHTML = `

                            <div class="dim-result-card__dim-name">${dim.nameEn}</div>
                            <div class="dim-result-card__type-name">${persona.name}</div>
                        </div>
                    </div>

                    <div class="dim-result-card__bar">
                        <div class="dim-result-card__bar-fill" id="bar-${dim.id}" 
                             style="background:${colors.barGrad}"></div>
                    </div>

                    <div class="dim-result-card__desc">${persona.desc}</div>

                    <div class="dim-result-card__strengths">
                        ${persona.strengths.map(s => `
                            <span class="strength-tag" style="background:${colors.bg}; color:${colors.color}">
                                ✦ ${s}
                            </span>
                        `).join('')}
                    </div>

                    <div class="dim-result-card__tip">${persona.tip}</div>

                    <div class="all-types-toggle" onclick="toggleTypes('${dim.id}')">
                        <i class="fas fa-chevron-down"></i>
                        이 차원의 7가지 유형 모두 보기
                    </div>
                    <div class="all-types-grid" id="types-${dim.id}">
                        ${allTypes.map((t, i) => `
                            <div class="all-type-chip ${i === result.typeIndex ? 'active' : ''}">
                                ${i === result.typeIndex ? '★ ' : ''}${t.name}
                            </div>

                    </div>
                `;

                container.appendChild(card);

                // Animate score bar
                setTimeout(() => {
                    const bar = document.getElementById(`bar-${dim.id}`);
                    if (bar) bar.style.width = `${score}%`;
                }, 300 + idx * 200);
            });
        }

        function toggleTypes(dimId) {
            const grid = document.getElementById(`types-${dimId}`);
            grid.classList.toggle('open');
        }

        // === Radar Chart Drawing ===
        function drawRadarChart(dimensionTypes, canvasId, staticDraw = false) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;

            const ctx = canvas.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const container = canvas.parentElement;
            const size = container.offsetWidth || 500;
            if (!staticDraw) {
                canvas.width = size * dpr;
                canvas.height = size * dpr;
                canvas.style.width = size + 'px';
                canvas.style.height = size + 'px';
                ctx.scale(dpr, dpr);
            } else {
                ctx.scale(2, 2); // For photocard 1000x1000 canvas to 500x500 context
            }

            const cx = size / 2;
            const cy = size / 2;
            const maxR = size / 2 - 50;
            const n = 5;
            const angles = [];
            for (let i = 0; i < n; i++) {
                angles.push((Math.PI * 2 * i / n) - Math.PI / 2);
            }

            const dimColors = ['#fbbf24', '#60a5fa', '#34d399', '#c084fc', '#fb7185'];

            // Grid rings
            for (let ring = 1; ring <= 5; ring++) {
                const r = (maxR / 5) * ring;
                ctx.beginPath();
                for (let i = 0; i < n; i++) {
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `rgba(255,255,255,${ring === 5 ? 0.08 : 0.04})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Axes
            for (let i = 0; i < n; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(cx + maxR * Math.cos(angles[i]), cy + maxR * Math.sin(angles[i]));
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            // Labels
            const dimIds = DIMENSIONS.map(d => d.id);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            DIMENSIONS.forEach((dim, i) => {
                const lr = maxR + 35;
                const x = cx + lr * Math.cos(angles[i]);
                const y = cy + lr * Math.sin(angles[i]);

                // Icon
                ctx.font = '18px sans-serif';
                ctx.fillText(dim.icon, x, y - 10);

                // Name
                ctx.font = '600 12px Pretendard';
                ctx.fillStyle = dimColors[i];
                ctx.fillText(dim.name, x, y + 8);
            });

            // Data values
            const values = DIMENSIONS.map(d => {
                const score = dimensionTypes[d.id].normalizedScore;
                return Math.max(0.1, score / 100);
            });

            // Animate or Static Draw
            const animDuration = 60; // frames
            let progress = staticDraw ? animDuration : 0;
            
            function animate() {
                if (!staticDraw) progress++;
                const t = Math.min(progress / animDuration, 1);
                const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic

                // Clear data area only
                ctx.save();

                // Data fill
                ctx.beginPath();
                values.forEach((v, i) => {
                    const r = maxR * v * ease;
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();

                const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
                grad.addColorStop(0, 'rgba(52, 211, 153, 0.3)');
                grad.addColorStop(0.5, 'rgba(129, 140, 248, 0.15)');
                grad.addColorStop(1, 'rgba(251, 113, 133, 0.1)');
                ctx.fillStyle = grad;
                ctx.fill();

                // Data stroke
                ctx.beginPath();
                values.forEach((v, i) => {
                    const r = maxR * v * ease;
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                });
                ctx.closePath();
                ctx.strokeStyle = 'rgba(52, 211, 153, 0.7)';
                ctx.lineWidth = 2.5;
                ctx.stroke();

                // Data points
                values.forEach((v, i) => {
                    const r = maxR * v * ease;
                    const x = cx + r * Math.cos(angles[i]);
                    const y = cy + r * Math.sin(angles[i]);

                    // Glow
                    ctx.beginPath();
                    ctx.arc(x, y, 10, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${hexToRgb(dimColors[i])}, 0.2)`;
                    ctx.fill();

                    // Point
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fillStyle = dimColors[i];
                    ctx.fill();

                    // Score label
                    if (t > 0.8) {
                        const labelR = maxR * v * ease + 18;
                        const lx = cx + labelR * Math.cos(angles[i]);
                        const ly = cy + labelR * Math.sin(angles[i]);
                        ctx.font = '700 11px Outfit';
                        ctx.fillStyle = 'rgba(255,255,255,0.7)';
                        ctx.textAlign = 'center';
                        ctx.fillText(Math.round(v * 100) + '%', lx, ly);
                    }
                });

                ctx.restore();

                if (!staticDraw && progress < animDuration) {
                    requestAnimationFrame(animate);
                }
            }

            if (staticDraw) {
                animate(); // Draw instantly
            } else {
                setTimeout(animate, 500);
            }
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `${r},${g},${b}`;
        }

\n        function copyResult() {

            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.share-btn--copy');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> 복사됨!';
                btn.style.borderColor = 'var(--primary)';
                btn.style.color = 'var(--primary)';
                setTimeout(() => {
                    btn.innerHTML = orig;
                    btn.style.borderColor = '';
                    btn.style.color = '';
                }, 2000);
            });
        }

        // Handle resize
        window.addEventListener('resize', () => {
            if (results) {
                drawRadarChart(results.dimensionTypes);
            }
        });
